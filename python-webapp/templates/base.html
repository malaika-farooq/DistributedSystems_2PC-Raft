<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">
    <title>{% block title %}ServerShop{% endblock %}</title>
</head>
<body>
    <div class="base">
        {% include "_header.html" %}

        <div class="content">
            {% block content %} <div id="grid" class="grid"></div> {% endblock %}
        </div>

        <div class="right">
            {% block right %}{% endblock %}
        </div>
        <div class="left">
            {% block left %}{% endblock %}

        </div>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
