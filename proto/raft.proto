syntax = "proto3";
package raft;

// ─────────────────────────────────────────────────────────────────────────────
//  Q3: Leader Election
// ─────────────────────────────────────────────────────────────────────────────

message RequestVoteRequest {
  int32  term            = 1;   // candidate's current term
  string candidate_id   = 2;   // node_id of the candidate
  int32  last_log_index = 3;   // index of candidate's last log entry
  int32  last_log_term  = 4;   // term of candidate's last log entry
}

message RequestVoteResponse {
  int32 term         = 1;   // responder's current term (candidate updates if stale)
  bool  vote_granted = 2;   // true = vote given
}

// ─────────────────────────────────────────────────────────────────────────────
//  Q4: Log Replication
// ─────────────────────────────────────────────────────────────────────────────

// Log entry format: <o, t, k+1>
//   o = operation string
//   t = term in which the entry was created
//   k+1 = 1-based log index
message LogEntry {
  int32  term      = 1;
  int32  index     = 2;
  string operation = 3;
}

// Sent by the leader on every heartbeat interval.
// The simplified Raft in Q4 ships the ENTIRE log each time.
// When entries is empty this serves as a pure heartbeat (Q3 only).
message AppendEntriesRequest {
  int32             term          = 1;   // leader's current term
  string            leader_id     = 2;   // so followers can redirect clients
  repeated LogEntry entries       = 3;   // entire log (may be empty for heartbeat)
  int32             leader_commit = 4;   // c: index of most recently committed entry
}

message AppendEntriesResponse {
  int32 term    = 1;   // current term of responder
  bool  success = 2;
}

// ─────────────────────────────────────────────────────────────────────────────
//  Q4: Client Interface
// ─────────────────────────────────────────────────────────────────────────────

message ClientRequest {
  string operation = 1;   // arbitrary command string (e.g. "SET x=1")
}

message ClientResponse {
  bool   success   = 1;
  string result    = 2;   // human-readable outcome
  string leader_id = 3;   // hint if this node is not the leader
}

// ─────────────────────────────────────────────────────────────────────────────
//  Unified Raft service exposed by every node
// ─────────────────────────────────────────────────────────────────────────────
service RaftService {
  // Q3: Candidates request votes during leader election
  rpc RequestVote      (RequestVoteRequest)    returns (RequestVoteResponse);

  // Q3+Q4: Leader sends heartbeats (Q3) and log entries (Q4) to followers
  rpc AppendEntries    (AppendEntriesRequest)  returns (AppendEntriesResponse);

  // Q4: Clients submit operations; non-leaders forward to the current leader
  rpc ExecuteOperation (ClientRequest)         returns (ClientResponse);
}
